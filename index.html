<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ENPY OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rowdies:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    font-family: 'Rowdies', cursive;
    background: #0f0f1a;
    color: #e0e0e0;
  }

  .header {
    padding: 2.5rem 1.5rem 1.5rem;
    text-align: center;
  }

  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
  }

  .header p {
    font-size: 0.75rem;
    font-weight: 300;
    color: #666;
    margin-top: 0.3rem;
  }

  /* App List */
  .app-list {
    padding: 0 1rem 2rem;
    max-width: 500px;
    margin: 0 auto;
  }

  .app-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem;
    margin-bottom: 0.75rem;
    border-radius: 1rem;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
  }

  .app-card:active {
    background: rgba(255, 255, 255, 0.08);
  }

  .app-card-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
  }

  .app-card-info {
    flex: 1;
    min-width: 0;
  }

  .app-card-name {
    font-size: 0.95rem;
    font-weight: 400;
    color: #fff;
  }

  .app-card-desc {
    font-size: 0.7rem;
    font-weight: 300;
    color: #888;
    margin-top: 0.15rem;
  }

  .app-card-meta {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.4rem;
  }

  .app-card-meta span {
    font-size: 0.6rem;
    font-weight: 300;
    color: #555;
  }

  .app-card-action {
    flex-shrink: 0;
  }

  .btn {
    font-family: 'Rowdies', cursive;
    font-size: 0.7rem;
    font-weight: 400;
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn:active { opacity: 0.7; }

  .btn-open {
    background: #3b82f6;
    color: #fff;
  }

  .btn-update {
    background: #22c55e;
    color: #fff;
  }

  .badge-update {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 300;
    background: #22c55e;
    color: #fff;
    padding: 0.1rem 0.4rem;
    border-radius: 1rem;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  /* Detail Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal {
    background: #1a1a2e;
    border-radius: 1.5rem 1.5rem 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 1.5rem;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .modal-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    object-fit: cover;
    background: rgba(255,255,255,0.05);
  }

  .modal-title {
    flex: 1;
  }

  .modal-title h2 {
    font-size: 1.2rem;
    font-weight: 700;
    color: #fff;
  }

  .modal-title p {
    font-size: 0.7rem;
    font-weight: 300;
    color: #888;
    margin-top: 0.2rem;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: none;
    border: none;
    color: #888;
    font-size: 1.5rem;
    cursor: pointer;
    font-family: 'Rowdies', cursive;
  }

  .modal-actions {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .modal-actions .btn {
    flex: 1;
    padding: 0.6rem;
    font-size: 0.8rem;
  }

  .btn-clear {
    background: rgba(255,255,255,0.08);
    color: #e0e0e0;
  }

  .modal-section {
    margin-bottom: 1.25rem;
  }

  .modal-section h3 {
    font-size: 0.8rem;
    font-weight: 400;
    color: #aaa;
    margin-bottom: 0.5rem;
  }

  .modal-section p, .modal-section li {
    font-size: 0.75rem;
    font-weight: 300;
    color: #ccc;
    line-height: 1.6;
  }

  .changelog-item {
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .changelog-item:last-child { border-bottom: none; }

  .changelog-version {
    font-size: 0.75rem;
    font-weight: 400;
    color: #fff;
  }

  .changelog-date {
    font-size: 0.6rem;
    color: #666;
    margin-left: 0.5rem;
  }

  .changelog-notes {
    font-size: 0.7rem;
    font-weight: 300;
    color: #999;
    margin-top: 0.25rem;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
  }

  .info-item {
    padding: 0.5rem;
    background: rgba(255,255,255,0.03);
    border-radius: 0.5rem;
  }

  .info-label {
    font-size: 0.55rem;
    font-weight: 300;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .info-value {
    font-size: 0.8rem;
    font-weight: 400;
    color: #fff;
    margin-top: 0.15rem;
  }
</style>
</head>
<body>

<div class="header">
  <h1>ENPY OS</h1>
  <p>Personal App Store</p>
</div>

<div class="app-list" id="app-list"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const BASE = 'https://nakulpillai.github.io';

const apps = [
  { id: 'bhakti', path: '/bhakti/' },
  { id: 'mini-radio', path: '/mini-radio/' }
];

const appListEl = document.getElementById('app-list');
const modalOverlay = document.getElementById('modal-overlay');
const modalEl = document.getElementById('modal');

// Store installed versions locally
function getInstalledVersion(id) {
  return localStorage.getItem('app_version_' + id);
}
function setInstalledVersion(id, version) {
  localStorage.setItem('app_version_' + id, version);
}

// Fetch version info for all apps
async function loadApps() {
  for (const app of apps) {
    try {
      const res = await fetch(BASE + app.path + 'version.json?t=' + Date.now());
      const data = await res.json();
      app.data = data;
      renderAppCard(app);
    } catch (e) {
      console.warn('Failed to load', app.id, e);
    }
  }
}

function renderAppCard(app) {
  const d = app.data;
  const installed = getInstalledVersion(app.id);
  const hasUpdate = installed && installed !== d.version;
  const isNew = !installed;

  const card = document.createElement('div');
  card.className = 'app-card';
  card.onclick = () => openDetail(app);
  card.innerHTML = `
    <img class="app-card-icon" src="${BASE + app.path + d.icon}" alt="${d.name}">
    <div class="app-card-info">
      <div class="app-card-name">
        ${d.name}
        ${hasUpdate ? '<span class="badge-update">Update</span>' : ''}
      </div>
      <div class="app-card-desc">${d.description}</div>
      <div class="app-card-meta">
        <span>v${d.version}</span>
        <span>${d.updated}</span>
      </div>
    </div>
    <div class="app-card-action">
      <button class="btn ${hasUpdate ? 'btn-update' : 'btn-open'}" onclick="event.stopPropagation(); ${hasUpdate ? `updateApp('${app.id}', '${d.version}', '${BASE + app.path}')` : `openApp('${app.id}', '${d.version}', '${BASE + app.path}')`}">
        ${hasUpdate ? 'Update' : isNew ? 'Get' : 'Open'}
      </button>
    </div>
  `;
  appListEl.appendChild(card);
}

function openApp(id, version, url) {
  setInstalledVersion(id, version);
  window.location.href = url;
}

async function updateApp(id, version, url) {
  // Clear the app's service worker cache
  if ('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  setInstalledVersion(id, version);
  window.location.href = url;
}

function openDetail(app) {
  const d = app.data;
  const installed = getInstalledVersion(app.id);
  const hasUpdate = installed && installed !== d.version;
  const isNew = !installed;

  modalEl.innerHTML = `
    <div class="modal-header">
      <img class="modal-icon" src="${BASE + app.path + d.icon}" alt="${d.name}">
      <div class="modal-title">
        <h2>${d.name}</h2>
        <p>${d.description}</p>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn ${hasUpdate ? 'btn-update' : 'btn-open'}" onclick="${hasUpdate ? `updateApp('${app.id}', '${d.version}', '${BASE + app.path}')` : `openApp('${app.id}', '${d.version}', '${BASE + app.path}')`}">
        ${hasUpdate ? 'Update to v' + d.version : isNew ? 'Get App' : 'Open App'}
      </button>
      <button class="btn btn-clear" onclick="clearAppData('${app.id}', '${BASE + app.path}')">Clear Cache</button>
    </div>

    <div class="info-grid modal-section">
      <div class="info-item">
        <div class="info-label">Version</div>
        <div class="info-value">${d.version}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Updated</div>
        <div class="info-value">${d.updated}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Installed</div>
        <div class="info-value">${installed || 'Not yet'}</div>
      </div>
      <div class="info-item">
        <div class="info-label">Status</div>
        <div class="info-value">${hasUpdate ? 'Update available' : installed ? 'Up to date' : 'New'}</div>
      </div>
    </div>

    <div class="modal-section">
      <h3>What's New</h3>
      ${d.changelog.map(c => `
        <div class="changelog-item">
          <span class="changelog-version">v${c.version}</span>
          <span class="changelog-date">${c.date}</span>
          <div class="changelog-notes">${c.notes}</div>
        </div>
      `).join('')}
    </div>
  `;

  modalOverlay.classList.add('open');
}

async function clearAppData(id, url) {
  if ('caches' in window) {
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
  }
  localStorage.removeItem('app_version_' + id);
  alert('Cache cleared. The app will re-download on next open.');
  closeModal();
  appListEl.innerHTML = '';
  loadApps();
}

function closeModal() {
  modalOverlay.classList.remove('open');
}

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});

loadApps();
</script>
</body>
</html>
